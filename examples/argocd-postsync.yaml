# ArgoCD PostSync hook that triggers a repository dispatch event after a
# successful sync. This replaces the inline bash JWT generation pattern.
#
# Prerequisites:
#   - A Secret named "ai-api-github-app-secret" containing:
#       GITHUB_APP_ID, GITHUB_APP_INSTALLATION_ID, GITHUB_APP_PRIVATE_KEY
apiVersion: batch/v1
kind: Job
metadata:
  name: prod-e2e
  namespace: ai-api
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      initContainers:
        - name: get-token
          image: enponsba/github-token:latest
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: ai-api-github-app-secret
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: ai-api-github-app-secret
                  key: GITHUB_APP_INSTALLATION_ID
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-api-github-app-secret
                  key: GITHUB_APP_PRIVATE_KEY
            - name: GITHUB_TOKEN_OUTPUT
              value: "file:/shared/token"
          volumeMounts:
            - name: shared
              mountPath: /shared

      containers:
        - name: prod-e2e
          image: alpine:3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              TOKEN=$(cat /shared/token)
              apk add --no-cache curl
              curl -sfL -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/quiquetech/ai-api-monorepo/dispatches" \
                -d '{"event_type":"prod-e2e"}'
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true

      volumes:
        - name: shared
          emptyDir: {}

      restartPolicy: Never
  backoffLimit: 2
